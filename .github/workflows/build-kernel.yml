name: Build Kernel

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - "screenshot/**"
      - "LICENSE"

concurrency:
  group: build-kernel-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-kernel:
    runs-on: ubuntu-24.04
    container:
      image: debian:13
    timeout-minutes: 360
    env:
      DEBIAN_FRONTEND: noninteractive
      GEMINIOS_LOG_DIR: /tmp/geminios-artifacts/logs
      GEMINIOS_OUTPUT_DIR: /tmp/geminios-artifacts/output
      GEMINIOS_KERNEL_OUTPUT_DIR: /tmp/geminios-artifacts/output/kernel
      GEMINIOS_KERNEL_PACKAGE_OUTPUT_DIR: /tmp/geminios-artifacts/output/kernel-packages
      GEMINIOS_KERNEL_STAGE_DIR: /tmp/geminios-kernel-stage
      GEMINIOS_KERNEL_BUILD_DIR: /tmp/geminios-kernel-build
      GEMINIOS_KERNEL_BUILD_ENABLED: ${{ vars.ENABLE_GEMINIOS_ISO_CI == 'true' || github.run_attempt != '1' }}
      GEMINIOS_KERNEL_PACKAGE_BUILD_ID: ${{ github.run_id }}.${{ github.run_attempt }}

    steps:
      - name: Gate kernel build
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GEMINIOS_KERNEL_BUILD_ENABLED}" != "true" ]]; then
            echo "::notice::Kernel build is gated off for the first run while ENABLE_GEMINIOS_ISO_CI is false."
            echo "::notice::Use the GitHub Actions 'Re-run jobs' button on this same job to execute the full build."
            exit 0
          fi

      - name: Check out repository
        if: env.GEMINIOS_KERNEL_BUILD_ENABLED == 'true'
        uses: actions/checkout@v4

      - name: Install host build dependencies
        if: env.GEMINIOS_KERNEL_BUILD_ENABLED == 'true'
        run: |
          apt-get update
          apt-get install -y \
            build-essential bison flex bc libncurses-dev libssl-dev libelf-dev \
            dwarves kmod rsync wget ca-certificates xz-utils zstd file perl python3

      - name: Build kernel
        if: env.GEMINIOS_KERNEL_BUILD_ENABLED == 'true'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$GEMINIOS_LOG_DIR"
          bash tools/ci_build_kernel.sh 2>&1 | tee "$GEMINIOS_LOG_DIR/kernel-build.log"

      - name: Build kernel package
        if: env.GEMINIOS_KERNEL_BUILD_ENABLED == 'true'
        shell: bash
        run: |
          set -euo pipefail
          kernel_dir="/home/creitin/Documents/geminios/external_dependencies/linux-7.1-rc2"
          kernel_release="$(make -s -C "$kernel_dir" kernelrelease)"
          modules_dir="$GEMINIOS_KERNEL_STAGE_DIR/lib/modules/$kernel_release"
          mkdir -p "$GEMINIOS_KERNEL_PACKAGE_OUTPUT_DIR"
          python3 tools/build_kernel_gpkg.py \
            --kernel-release "$kernel_release" \
            --bzimage "$kernel_dir/arch/x86/boot/bzImage" \
            --modules-dir "$modules_dir" \
            --config-file "$kernel_dir/.config" \
            --output-root "$GEMINIOS_KERNEL_PACKAGE_OUTPUT_DIR" \
            --export-root "$GEMINIOS_KERNEL_PACKAGE_OUTPUT_DIR/export" \
            --build-id "$GEMINIOS_KERNEL_PACKAGE_BUILD_ID" \
            --channel stable

      - name: Upload kernel artifacts
        if: always() && env.GEMINIOS_KERNEL_BUILD_ENABLED == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: geminios-kernel-${{ github.sha }}
          if-no-files-found: warn
          path: |
            ${{ env.GEMINIOS_OUTPUT_DIR }}/kernel/**

      - name: Upload kernel package artifacts
        if: always() && env.GEMINIOS_KERNEL_BUILD_ENABLED == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: geminios-kernel-packages-${{ github.sha }}
          if-no-files-found: warn
          path: |
            ${{ env.GEMINIOS_KERNEL_PACKAGE_OUTPUT_DIR }}/packages/**
            ${{ env.GEMINIOS_KERNEL_PACKAGE_OUTPUT_DIR }}/export/**

      - name: Upload build logs
        if: always() && env.GEMINIOS_KERNEL_BUILD_ENABLED == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: geminios-kernel-logs-${{ github.sha }}
          if-no-files-found: warn
          path: |
            ${{ env.GEMINIOS_LOG_DIR }}/**
