# Upgrade companion groups for base runtimes that should move together when
# gpkg starts managing them. Syntax:
#   trigger: companion1 companion2 companion3
#
# Keep this focused on stacks that are shipped in the base image and that tend
# to break when only one package is upgraded out of band.

dbus: dbus-x11 dbus-system-bus default-dbus-session-bus default-dbus-system-bus dbus-session-bus
elogind: logind libelogind0 libpam-elogind libpam-systemd libsystemd0
libpam0g: libpam-modules libpam-modules-bin libpam-runtime
libcap2: libcap2-bin
libc6: libc-bin libc-dev-bin libc6-dev linux-libc-dev locales libc-l10n
libgcc-s1: libstdc++6
python3: python3-minimal

wayland: wayland-protocols libwayland-egl1
libdrm: libpciaccess libdrm2
libglvnd: libglvnd0 libegl1 libgl1 libglx0 libopengl0 libgles1 libgles2
libxkbcommon: wayland xkeyboard-config libxcb xcb-util-keysyms
mesa: libdrm libdrm2 libglvnd libglvnd0 libxshmfence libxkbcommon wayland libgbm1 libglapi-mesa mesa-libgallium libegl-mesa0 libgl1-mesa-dri libglx-mesa0
json-glib: libjson-glib-1.0-0
dconf: dconf-cli dconf-gsettings-backend dconf-service libdconf1
libinput: libinput10
xorg-server: x11-common xorgproto xtrans libxau libxdmcp libxcb xcb-util xcb-util-keysyms libx11 libxext libxxf86vm libxpm libxrender libxfixes libxdamage libxcomposite libxcursor libxrandr libxi libxtst libxinerama libXres libxkbfile libfontenc libxfont2 xkbcomp xkeyboard-config setxkbmap xf86-video-fbdev xf86-input-evdev xinit xterm xwayland
